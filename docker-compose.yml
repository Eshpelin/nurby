version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: nurby
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nurby_dev}
      POSTGRES_DB: nurby
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nurby"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mediamtx:
    image: bluenviron/mediamtx:latest
    restart: unless-stopped
    ports:
      - "8554:8554"   # RTSP
      - "8889:8889"   # WebRTC
      - "8888:8888"   # HLS
      - "9997:9997"   # API
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://nurby:${POSTGRES_PASSWORD:-nurby_dev}@postgres:5432/nurby
      REDIS_URL: redis://redis:6379/0
      MEDIAMTX_API_URL: http://mediamtx:9997
      RECORDINGS_PATH: /data/recordings
      THUMBNAILS_PATH: /data/thumbnails
    volumes:
      - recordings:/data/recordings
      - thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      # NEXT_PUBLIC_* values are inlined into the Next.js build output
      # (client JS bundle and routes-manifest.json for rewrites). They MUST
      # be present at `next build` time, so we pass them as build args.
      # Changing any of these requires `docker compose build frontend`.
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
        NEXT_PUBLIC_WEBRTC_URL: http://localhost:8889
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # NEXT_PUBLIC_* values are READ in two places with different runtimes:
      #   1. next.config.ts rewrites()  -> runs in the frontend container
      #      (server-side at startup). Use Docker network hostnames.
      #   2. React components in src/   -> run in the user's browser, AND
      #      the value is INLINED into the client JS bundle at `next build`
      #      time. Must be reachable from the host (localhost), and changing
      #      it requires rebuilding the frontend image (or wiring it as an
      #      ARG into frontend/Dockerfile before `npm run build`).
      #
      # Used server-side by next.config.ts rewrites() to proxy /api/* from
      # the browser through Next.js to the API container.
      NEXT_PUBLIC_API_URL: http://api:8000
      # Currently not referenced by any client code; kept here for reference
      # so future browser WebSocket clients use the host-published port.
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
      # Used by the browser (src/app/page.tsx) to open WebRTC streams from
      # MediaMTX. Must be a URL the browser can reach -> host's localhost.
      NEXT_PUBLIC_WEBRTC_URL: http://localhost:8889
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  recordings:
  thumbnails:
