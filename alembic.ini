[alembic]
script_location = alembic
# Placeholder only. alembic/env.py overrides this at runtime with the
# DATABASE_URL environment variable, so set your real connection string
# there (or in .env), not here.
sqlalchemy.url = postgresql+asyncpg://nurby:USE_YOUR_OWN_PASS@localhost:5433/nurby

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
