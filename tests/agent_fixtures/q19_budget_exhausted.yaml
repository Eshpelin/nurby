id: q19_budget_exhausted
question: "Run a fancy analysis on every frame from this week."
tags: [failure_mode, budget]
# Per-run hard cap. With a single 1-cent LLM turn the very next turn
# trips the budget check and the driver bails before calling tools.
budget_cents: 1
seed: {}
mocked_llm:
  - tokens_in: 100
    tokens_out: 200
    cost_cents: 1
    tool_uses:
      - name: query_observations
        arguments: { query: "everything", hours: 168 }
  - tool_uses:
      - name: analyze_clip
        arguments:
          camera_id: "11111111-1111-1111-1111-111111111111"
          time_from: "2026-05-23T00:00:00Z"
          time_to: "2026-05-23T00:05:00Z"
          question: "describe everything"
expected:
  status: budget_exhausted
  final_answer_contains: ["budget"]
