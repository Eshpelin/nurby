      - { answer: "Yes, the package is still on the porch.", verdict: "yes", confidence: 0.9, frames_analyzed: 1, cached: false, cost_cents: 2 }
      - { answer: "Yes, the package is still on the porch.", verdict: "yes", confidence: 0.9, frames_analyzed: 1, cached: true, cost_cents: 0 }
conversation:
  - question: "Is the front porch package still there?"
  - question: "Is the front porch package still there?"
